quarkus.main.runner=enabled

# Disable console logging so the MCP stdio channel (stdout) stays clean
quarkus.log.console.enable=false

# Write all log output (including the startup banner) to a file
quarkus.log.file.enable=true
quarkus.log.file.path=mcp-server.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] %s%e%n
